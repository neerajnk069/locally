  <script>
    function checkSidebarEnable() {
      const body = document.body;
      const width = window.innerWidth;
      
      if (width > 1200) {
        body.classList.add('sidebar-enable'); 
      } else {
        body.classList.remove('sidebar-enable'); 
      }
    }

    checkSidebarEnable();

    window.addEventListener('resize', checkSidebarEnable);

    function initDashboardScripts() {
      const mapContainer = document.getElementById('sales-by-locations');
      if (!mapContainer) {
        setTimeout(initDashboardScripts, 100);
        return;
      }

      const scripts = [
        // '/assets/libs/metismenu/metisMenu.min.js',
        '/assets/libs/simplebar/simplebar.min.js',
        '/assets/libs/apexcharts/apexcharts.min.js',
        '/assets/libs/jsvectormap/jsvectormap.min.js',
        '/assets/libs/jsvectormap/us-merc-en.js',
        '/assets/libs/select2/select2.min.js',
        // '/assets/js/pages/dashboard.init.js'
      ];

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = src;
          script.onload = resolve;
          script.onerror = reject;
          document.body.appendChild(script);
        });
      }

      async function loadAllScripts() {
        for (const src of scripts) {
          await loadScript(src);
        }
      }

      loadAllScripts();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initDashboardScripts);
    } else {
      initDashboardScripts();
    }

    $(document).ready(function () {
      $("#togglePassword").on("click", function () {
        const passwordInput = $("#password");
        const icon = $(this);
        const type = passwordInput.attr("type") === "password" ? "text" : "password";
        passwordInput.attr("type", type);

        if (type === "text") {
          icon.removeClass("ri-eye-off-line").addClass("ri-eye-line");
        } else {
          icon.removeClass("ri-eye-line").addClass("ri-eye-off-line");
        }
      });
    });
  </script>
